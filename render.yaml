# render.yaml — Render Blueprint for CodeVision (single-service setup)
#
# The frontend (React/Vite) is built first, then the FastAPI backend serves
# both the API and the compiled static files from a single Render Web Service.
# This means one URL, no CORS issues between frontend and backend, and a
# simpler free-tier setup.
#
# IMPORTANT — Render dashboard settings required:
#   Root Directory  : (leave blank / repo root)
#   Build Command   : cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
#   Start Command   : cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
#
# Set environment variable values marked "sync: false" directly in the
# Render dashboard — they are intentionally left blank here so they are
# never committed to version control.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Single Web Service: FastAPI backend + React frontend ───────────────────
  - type: web
    name: codevision
    runtime: python
    region: oregon
    plan: free

    # Root directory is the repo root (not backend/) because we need to build
    # the frontend first before the backend pip install step.
    # Leave rootDir unset (defaults to repo root).

    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # ── Database (MySQL — set these in the Render dashboard) ─────────────
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: codevision_db

      # ── JWT Auth ──────────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # ── CORS ──────────────────────────────────────────────────────────────
      # Frontend and backend share the same origin — CORS is only needed for
      # external API consumers or a custom domain. Leave unset for standard setup.
      - key: ALLOWED_ORIGINS
        sync: false

      # ── SSL / CA Certificate (Aiven-hosted MySQL) ─────────────────────────
      # Paste the full PEM text of the Aiven CA certificate here.
      # Leave blank if your MySQL host does not require SSL verification.
      - key: DB_SSL_CA_CONTENT
        sync: false
