# render.yaml — Render Blueprint for CodeVision
# Place this file at the repository root.
#
# When you connect this repository to Render, Render will auto-detect this file
# and create both services for you.  Set the environment variable values
# marked "sync: false" (i.e. secrets) directly in the Render dashboard or
# via the Render CLI — they are intentionally left blank here so they are
# never committed to version control.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend — FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: codevision-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # ── Database (MySQL — set these in the Render dashboard) ─────────────
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: codevision_db

      # ── JWT Auth ──────────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend — Vite/React Static Site ─────────────────────────────────────
  - type: web
    name: codevision-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    # SPA routing: all paths serve index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        sync: false
